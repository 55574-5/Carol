<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Carol 💌</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --creme: #fdf6ee;
    --creme2: #f7ece0;
    --rosa: #c97b84;
    --rosa-claro: #f2c4c8;
    --marrom: #6b4c3b;
    --texto: #3d2b1f;
    --texto2: #7a5c50;
  }

  body {
    background: var(--creme);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* PÉTALAS */
  .petala {
    position: fixed;
    pointer-events: none;
    font-size: 16px;
    opacity: 0;
    z-index: 0;
    animation: cair linear infinite;
  }

  @keyframes cair {
    0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
    10%  { opacity: 0.7; }
    90%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(100vh) rotate(360deg); }
  }

  /* ENVELOPE */
  #cena-envelope {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    z-index: 10;
    animation: aparecer 1s ease forwards;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .envelope-svg {
    width: 260px;
    filter: drop-shadow(0 8px 24px rgba(180,100,100,0.15));
    cursor: pointer;
    transition: transform 0.3s;
  }

  .envelope-svg:hover { transform: scale(1.04) translateY(-4px); }

  .envelope-para {
    font-family: 'Pinyon Script', cursive;
    font-size: 32px;
    color: var(--marrom);
    opacity: 0;
    animation: aparecer 1s 0.6s ease forwards;
  }

  .btn-abrir {
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 0.12em;
    color: var(--texto2);
    border: 1px solid var(--rosa-claro);
    background: transparent;
    padding: 11px 32px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.25s;
    opacity: 0;
    animation: aparecer 1s 1s ease forwards;
  }

  .btn-abrir:hover {
    background: var(--rosa-claro);
    color: var(--marrom);
  }

  /* CARTA */
  #cena-carta {
    display: none;
    width: min(560px, 94vw);
    z-index: 10;
    animation: subirCarta 0.8s ease forwards;
  }

  @keyframes subirCarta {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .papel {
    background: var(--creme2);
    border: 1px solid rgba(180,130,100,0.2);
    border-radius: 4px;
    padding: clamp(1.8rem, 5vw, 3rem) clamp(1.8rem, 5vw, 3.5rem);
    position: relative;
    box-shadow: 0 4px 40px rgba(100,60,40,0.08), inset 0 0 0 1px rgba(255,255,255,0.6);
  }

  .papel::before {
    content: '';
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--rosa-claro), transparent);
    border-radius: 0 0 4px 4px;
  }

  .linha-decorativa {
    width: 48px;
    height: 1px;
    background: var(--rosa-claro);
    margin: 0 auto 2rem;
  }

  .carta-data {
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--texto2);
    text-align: right;
    margin-bottom: 1.8rem;
    font-style: italic;
  }

  .carta-para {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(28px, 5vw, 38px);
    color: var(--rosa);
    margin-bottom: 1.6rem;
    line-height: 1;
  }

  .carta-corpo {
    font-size: clamp(16px, 2.2vw, 18px);
    line-height: 1.95;
    color: var(--texto);
    font-weight: 300;
    min-height: 120px;
    white-space: pre-wrap;
  }

  .cursor-pisca {
    display: inline-block;
    width: 1.5px;
    height: 1em;
    background: var(--rosa);
    margin-left: 1px;
    vertical-align: text-bottom;
    animation: pisca 0.75s step-end infinite;
  }

  @keyframes pisca {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .assinatura {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(30px, 5vw, 42px);
    color: var(--marrom);
    text-align: right;
    margin-top: 2.5rem;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .divisor-final {
    width: 1px;
    height: 40px;
    background: var(--rosa-claro);
    margin: 2rem auto;
    opacity: 0;
    transition: opacity 1s 0.5s;
  }

  .btn-reler {
    display: block;
    margin: 1.5rem auto 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--texto2);
    border: 1px solid rgba(180,130,100,0.25);
    background: transparent;
    padding: 9px 28px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.25s;
    opacity: 0;
  }

  .btn-reler.visivel { opacity: 1; transition: opacity 1s 1s; }
  .btn-reler:hover { background: var(--creme2); border-color: var(--rosa-claro); }

  /* FLUTUANTES */
  .flutuante {
    position: fixed;
    pointer-events: none;
    font-size: 20px;
    opacity: 0;
    z-index: 999;
    animation: flutuar 2.5s ease-out forwards;
  }

  @keyframes flutuar {
    0%   { opacity: 0; transform: translateY(0) scale(0.8); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-90px) scale(0.4); }
  }
</style>
</head>
<body>

<!-- Pétalas de fundo -->
<div id="petalas"></div>

<!-- Cena do envelope -->
<div id="cena-envelope">
  <svg class="envelope-svg" viewBox="0 0 260 180" xmlns="http://www.w3.org/2000/svg" onclick="abrirCarta()">
    <rect x="4" y="4" width="252" height="172" rx="8" fill="#fdf0e8" stroke="#e8c4b0" stroke-width="1"/>
    <!-- flap -->
    <path d="M4 12 Q4 4 12 4 L248 4 Q256 4 256 12 L130 100 Z" fill="#f2c4c8" opacity="0.8"/>
    <!-- laterais -->
    <path d="M4 16 L100 95" stroke="#e8c4b0" stroke-width="0.5" fill="none"/>
    <path d="M256 16 L160 95" stroke="#e8c4b0" stroke-width="0.5" fill="none"/>
    <!-- base -->
    <path d="M4 176 L100 95 L160 95 L256 176" fill="#fae8dc" stroke="#e8c4b0" stroke-width="0.5"/>
    <!-- lacre coração -->
    <text x="130" y="115" text-anchor="middle" font-size="22" fill="#c97b84">💌</text>
  </svg>

  <p class="envelope-para">para Carol</p>
  <button class="btn-abrir" onclick="abrirCarta()">abrir carta</button>
</div>

<!-- Cena da carta -->
<div id="cena-carta">
  <div class="papel" id="papel">
    <div class="linha-decorativa"></div>
    <div class="carta-data" id="data-el"></div>
    <div class="carta-para">Carol,</div>
    <div class="carta-corpo" id="corpo-el"><span class="cursor-pisca" id="cursor"></span></div>
    <div class="divisor-final" id="divisor"></div>
    <div class="assinatura" id="assinatura-el">Rossettini G</div>
  </div>
  <button class="btn-reler" id="btn-reler" onclick="reler()">↺ ler de novo</button>
</div>

<script>
const TEXTO = `Fiz essa pequena surpresa só para demonstrar um pouco do que eu sinto por você.

Sei que ultimamente não estamos tendo tanto tempo um para o outro, mas queria te lembrar o quanto eu te amo.

Você sempre foi alguém que eu precisava na minha vida, alguém que acendesse meu fogo e que me desse vontade de viver.

Por muitos anos estive em um momento de querer ser visto, que as pessoas me amassem do jeito que eu era. Depois de anos de insistência, eu nunca deixei o que eu achava certo de lado — o jeito que eu queria que me tratassem, eu tratava as pessoas.

Mas sempre que essas pessoas se sentiram seguras e sabiam que eu estava lá para tudo, pisavam e me descartavam.

Até você chegar e mostrar que eu não estava errado, apenas estava em lugares errados.

Me encontrei em cada conversa nossa desde então. Cada abraço, cada beijo, cada momento — não era sobre onde eu estava, era sobre se eu estava com você.

Agradeço todos os dias por você me chamar de amor, por você me chamar de seu, por me escolher em tudo.

Te amo e seguirei te amando até o fim.`;

let timeouts = [];

function criarPetalas() {
  const c = document.getElementById('petalas');
  const tipos = ['🌸','🌷','✿','❀','🌺'];
  for (let i = 0; i < 14; i++) {
    const p = document.createElement('div');
    p.className = 'petala';
    p.textContent = tipos[Math.floor(Math.random() * tipos.length)];
    p.style.left = (Math.random() * 100) + 'vw';
    p.style.fontSize = (12 + Math.random() * 12) + 'px';
    p.style.animationDuration = (7 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 12) + 's';
    c.appendChild(p);
  }
}

function abrirCarta() {
  document.getElementById('cena-envelope').style.display = 'none';
  const cena = document.getElementById('cena-carta');
  cena.style.display = 'block';
  document.getElementById('data-el').textContent = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('assinatura-el').style.opacity = '0';
  document.getElementById('divisor').style.opacity = '0';
  document.getElementById('btn-reler').classList.remove('visivel');
  digitar();
}

function digitar() {
  const corpo = document.getElementById('corpo-el');
  const cursor = document.getElementById('cursor') || (() => {
    const c = document.createElement('span');
    c.className = 'cursor-pisca';
    c.id = 'cursor';
    return c;
  })();

  corpo.innerHTML = '';
  corpo.appendChild(cursor);
  timeouts.forEach(clearTimeout);
  timeouts = [];

  let i = 0;
  const vel = 22;

  function proxChar() {
    if (i >= TEXTO.length) {
      cursor.remove();
      const t1 = setTimeout(() => {
        document.getElementById('divisor').style.opacity = '1';
        document.getElementById('assinatura-el').style.opacity = '1';
      }, 600);
      const t2 = setTimeout(() => {
        document.getElementById('btn-reler').classList.add('visivel');
      }, 1800);
      timeouts.push(t1, t2);
      return;
    }

    const ch = TEXTO[i++];
    const span = document.createElement('span');
    span.textContent = ch;
    corpo.insertBefore(span, cursor);

    if (i % 40 === 0 && Math.random() > 0.5) soltar();

    const delay = '.!?'.includes(ch) ? vel * 10 : ch === ',' ? vel * 4 : ch === '\n' ? vel * 5 : vel;
    timeouts.push(setTimeout(proxChar, delay));
  }

  timeouts.push(setTimeout(proxChar, 300));
}

function reler() {
  document.getElementById('assinatura-el').style.opacity = '0';
  document.getElementById('divisor').style.opacity = '0';
  document.getElementById('btn-reler').classList.remove('visivel');
  setTimeout(digitar, 200);
}

function soltar() {
  const el = document.createElement('div');
  el.className = 'flutuante';
  el.textContent = ['🌸','💕','✨','🌷','💗','🥀'][Math.floor(Math.random()*6)];
  el.style.left = (20 + Math.random() * 60) + 'vw';
  el.style.bottom = (20 + Math.random() * 20) + 'vh';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

criarPetalas();
</script>
</body>
</html>
